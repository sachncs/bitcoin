name: CI

on:
  push:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - name: Check yapf formatting
        run: |
          if uv run yapf -d -r ./bitcoin | grep . > /dev/null 2>&1; then
            echo "yapf: formatting changes detected"
            exit 1
          fi
          echo "yapf: no formatting changes needed"
      - run: uv run ruff check bitcoin/ tests/
      - run: uv run mypy bitcoin/
      - run: uv run mypy tests/ --ignore-missing-imports
      - name: Audit dependencies for known CVEs
        run: uv run pip-audit

  test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=99

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/test_benchmarks.py --benchmark-only --benchmark-json benchmark.json
      - name: Store benchmark result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark
          path: benchmark.json

  test-coincurve:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: "coincurve-${{ matrix.python-version }}"
      - run: uv sync --extra dev --extra coincurve --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=99
