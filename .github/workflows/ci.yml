name: CI

on:
  push:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - name: Check yapf formatting
        run: |
          if uv run yapf -d -r ./bitcoin | grep . > /dev/null 2>&1; then
            echo "yapf: formatting changes detected"
            exit 1
          fi
          echo "yapf: no formatting changes needed"
      - run: uv run ruff check bitcoin/ tests/
      - run: uv run mypy bitcoin/
      - run: uv run mypy tests/ --ignore-missing-imports
      - name: Audit dependencies for known CVEs
        run: uv run pip-audit

  test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=99

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/test_benchmarks.py --benchmark-only --benchmark-json benchmark.json
      - name: Store benchmark result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: benchmark
          path: benchmark.json

  test-coincurve:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: "coincurve-${{ matrix.python-version }}"
      - run: uv sync --extra dev --extra coincurve --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=99
