name: CI

on:
  push:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - name: Check formatting with ruff
        run: uv run ruff format --check bitcoin/ tests/
      - run: uv run ruff check bitcoin/ tests/
      - run: uv run mypy bitcoin/
      - run: uv run mypy tests/ --ignore-missing-imports
      - name: Audit dependencies for known CVEs
        run: uv run pip-audit

  test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=80

  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run pytest tests/test_benchmarks.py --benchmark-only --benchmark-json benchmark.json
      - name: Store benchmark result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark
          path: benchmark.json
      - name: Create gh-pages branch if missing
        run: git checkout --orphan gh-pages && git reset --hard && git checkout "${{ github.ref_name }}" || true
      - name: Compare benchmarks to main
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: true


  test-coincurve:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: "coincurve-${{ matrix.python-version }}"
      - run: uv sync --extra dev --extra coincurve --frozen
      - run: uv run pytest tests/ -v --cov=bitcoin --cov-report=term-missing --cov-fail-under=80
